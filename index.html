<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的一天 🌅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Arial', sans-serif; }
  #gameContainer { position: relative; width: 480px; height: 600px; }
  canvas { position: absolute; top: 0; left: 0; z-index: 1; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); cursor: pointer; }
  #statusBar { position: absolute; top: 10px; left: 0; right: 0; z-index: 10; text-align: center; pointer-events: none; }
  #statusMsg { background: rgba(0,0,0,0.55); color: #fff; border-radius: 12px; padding: 6px 14px; font-size: 13px; display: inline-block; }
  #hint { position: absolute; bottom: 14px; left: 0; right: 0; z-index: 10; text-align: center; pointer-events: none; }
  #hintMsg { background: rgba(255,200,80,0.85); color: #333; border-radius: 20px; padding: 6px 18px; font-size: 13px; font-weight: bold; display: inline-block; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="c" width="480" height="600"></canvas>
  <div id="statusBar"><span id="statusMsg">🌙 夜晚... 好好睡一觉吧</span></div>
  <div id="hint"><span id="hintMsg">👆 点击人物互动！</span></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W = 480, H = 600;

  function setMsg(m) { document.getElementById('statusMsg').textContent = m; }
  function setHint(m) { document.getElementById('hintMsg').textContent = m; }
  function lerp(a, b, t) { return a + (b - a) * t; }

  // ---- STATE ----
  var phase = 'night';
  var sleeping = true;
  var windowOpen = false;
  var lightOn = false;
  var raining = false;
  var raindrops = [];
  var hasMeal = false;
  var hasDinner = false;
  var cooking = false;
  var cookingDinner = false;
  var eating = false;
  var steamFrames = 0;
  var tick = 0;
  var clickable = false;

  // Sky
  var skyColor = [15, 10, 40];
  var targetSky = [15, 10, 40];
  function setSky(r,g,b){ targetSky=[r,g,b]; }

  // Sun & Moon
  var sunX = -60, sunY = 120;
  var moonX = 380, moonY = 60;

  // Person
  var personX = 245, personY = 0;
  var personTargetX = 245;
  var personWalking = false;
  var personFacing = 1;
  var personAction = '';
  var actionCallback = null;

  function walkTo(tx, cb) {
    personTargetX = tx;
    personWalking = true;
    personFacing = tx > personX ? 1 : -1;
    personAction = 'walk';
    actionCallback = cb;
  }

  function spawnRain() {
    raindrops = [];
    for (var i = 0; i < 80; i++) {
      raindrops.push({ x: Math.random()*W, y: Math.random()*H, spd: 6+Math.random()*4, len: 12+Math.random()*10 });
    }
  }

  // ---- PHASE TRIGGERS ----
  function startDay() {
    phase = 'rising';
    setSky(255, 160, 80);
    sunX = 20; sunY = 150;
    setMsg('🌅 太阳升起来了！');
    setHint('👆 点击人物起床！');
    clickable = true;
  }

  function doWakeUp() {
    clickable = false;
    sleeping = false;
    personAction = 'stand';
    personX = 245; personTargetX = 245;
    phase = 'morning';
    setMsg('🌅 早上好！去开窗吧！');
    setHint('👆 点击人物去开窗！');
    setTimeout(function(){ clickable = true; }, 600);
  }

  function doGoWindow() {
    clickable = false;
    setMsg('🚶 走向窗户...');
    setHint('');
    walkTo(100, function(){
      personFacing = -1;
      personAction = 'stand';
      windowOpen = true;
      phase = 'windowOpen';
      setSky(135, 206, 250);
      setMsg('🪟 窗户打开了！新鲜空气～去煮早餐吧！');
      setTimeout(function(){ setHint('👆 点击人物去煮早餐！'); clickable = true; }, 700);
    });
  }

  function doGoCook() {
    clickable = false;
    setMsg('🚶 走向厨房...');
    setHint('');
    walkTo(330, function(){
      personAction = 'cook';
      cooking = true;
      phase = 'cooking';
      setSky(100, 180, 255);
      setMsg('🍳 煮早餐中... 香喷喷的煎蛋！');
      setTimeout(function(){
        cooking = false; hasMeal = true;
        phase = 'goEat';
        setMsg('🍽️ 早餐好了！去吃吧！');
        setHint('👆 点击人物去吃早餐！');
        clickable = true;
      }, 3500);
    });
  }

  function doGoEat() {
    clickable = false;
    setMsg('🚶 走向桌子...');
    walkTo(205, function(){
      personAction = 'eat';
      eating = true;
      phase = 'eating';
      setMsg('😋 吃早餐中... 好好吃！');
      setTimeout(function(){
        eating = false; hasMeal = false;
        phase = 'afternoon';
        setSky(70, 140, 220);
        setMsg('☀️ 吃完了！美好的下午...');
        setHint('');
        setTimeout(function(){
          phase = 'raining';
          raining = true; spawnRain();
          setSky(80, 90, 110);
          setMsg('🌧️ 突然下雨了！快去关窗！');
          setHint('👆 点击人物去关窗！');
          clickable = true;
        }, 3000);
      }, 3500);
    });
  }

  function doCloseWindow() {
    clickable = false;
    setMsg('🚶 跑去关窗...');
    setHint('');
    walkTo(100, function(){
      personFacing = -1;
      windowOpen = false;
      phase = 'winClosed';
      setMsg('🪟 窗户关上了！等雨停吧...');
      personAction = 'stand';
      setTimeout(function(){
        raining = false; raindrops = [];
        setSky(160, 130, 190);
        phase = 'rainOver';
        setMsg('🌤️ 雨停了！去开窗吧！');
        setHint('👆 点击人物去开窗！');
        clickable = true;
      }, 5000);
    });
  }

  function doOpenWindowAgain() {
    clickable = false;
    walkTo(100, function(){
      personFacing = -1;
      windowOpen = true;
      phase = 'dusk';
      setSky(40, 30, 80);
      setMsg('🌆 天色暗了... 自动开灯，去煮晚餐吧！');
      setHint('');
      lightOn = true;
      setTimeout(function(){
        setMsg('💡 灯开了！去煮晚餐吧！');
        setHint('👆 点击人物去煮晚餐！');
        clickable = true;
      }, 1500);
    });
  }

  function doGoCookDinner() {
    clickable = false;
    setMsg('🚶 走向厨房...');
    setHint('');
    walkTo(330, function(){
      personAction = 'cook';
      cookingDinner = true;
      phase = 'cookingDinner';
      setSky(15, 10, 60);
      setMsg('🍜 煮晚餐中... 热腾腾的面！');
      setTimeout(function(){
        cookingDinner = false; hasDinner = true;
        phase = 'moonlit';
        setSky(15, 10, 40);
        moonX = 380; moonY = 60;
        setMsg('🌕 晚餐好了！月亮出来了，吃完关灯睡觉吧！');
        setHint('👆 点击人物去睡觉！');
        clickable = true;
      }, 3500);
    });
  }

  function doSleep() {
    clickable = false;
    setHint('');
    walkTo(245, function(){
      lightOn = false;
      hasDinner = false;
      windowOpen = false;
      sleeping = true;
      personAction = 'sleep';
      phase = 'night';
      setSky(15, 10, 40);
      sunX = -60; sunY = 150;
      setMsg('🌙 晚安！甜甜的梦～');
      setTimeout(function(){
        startDay();
      }, 4000);
    });
  }

  // ---- CLICK HANDLER ----
  var canvasEl = document.getElementById('c');
  if (canvasEl) canvasEl.addEventListener('click', function(e) {
    if (!clickable) return;
    var rect = canvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left) * (W / rect.width);
    var my = (e.clientY - rect.top) * (H / rect.height);
    // When sleeping, person is lying in bed — use bed center as hit area
    var px = sleeping ? 245 : personX;
    var py = sleeping ? H*0.55+58 : H*0.55+30;
    var dist = Math.sqrt((mx-px)*(mx-px)+(my-py)*(my-py));
    if (dist > 65) return;
    if (phase === 'rising') doWakeUp();
    else if (phase === 'morning') doGoWindow();
    else if (phase === 'windowOpen') doGoCook();
    else if (phase === 'goEat') doGoEat();
    else if (phase === 'raining') doCloseWindow();
    else if (phase === 'rainOver') doOpenWindowAgain();
    else if (phase === 'dusk') doGoCookDinner();
    else if (phase === 'moonlit') doSleep();
  });

  // ---- DRAW FUNCTIONS ----
  function drawSky() {
    var c = skyColor;
    var grad = ctx.createLinearGradient(0,0,0,H*0.55);
    grad.addColorStop(0, `rgb(${c[0]},${c[1]},${c[2]})`);
    grad.addColorStop(1, `rgb(${Math.min(c[0]+40,255)},${Math.min(c[1]+30,255)},${Math.min(c[2]+20,255)})`);
    ctx.fillStyle = grad; ctx.fillRect(0,0,W,H*0.55);
  }

  function drawSun() {
    if (phase==='night'||phase==='moonlit'||phase==='cookingDinner') return;
    ctx.save();
    var grad = ctx.createRadialGradient(sunX,sunY,5,sunX,sunY,50);
    grad.addColorStop(0,'rgba(255,240,100,0.8)'); grad.addColorStop(1,'rgba(255,200,0,0)');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(sunX,sunY,50,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFE033'; ctx.beginPath(); ctx.arc(sunX,sunY,22,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawMoon() {
    if (phase!=='night'&&phase!=='moonlit'&&phase!=='cookingDinner') return;
    ctx.save();
    ctx.fillStyle='#FFFDE0'; ctx.beginPath(); ctx.arc(moonX,moonY,24,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(200,200,180,0.3)'; ctx.beginPath(); ctx.arc(moonX+8,moonY-6,8,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawClouds() {
    if (phase==='night'||phase==='moonlit') return;
    ctx.save();
    ctx.fillStyle = raining ? 'rgba(100,100,120,0.85)' : 'rgba(255,255,255,0.75)';
    var offsets = [(tick*0.2)%W, (tick*0.15+180)%W, (tick*0.1+320)%W];
    offsets.forEach(function(x){
      ctx.beginPath(); ctx.ellipse(x,70,45,22,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+30,65,30,18,0,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();
  }

  function drawRoom() {
    // Floor
    ctx.fillStyle='#C8A97A'; ctx.fillRect(0,H*0.55,W,H*0.45);
    // Wall line
    ctx.fillStyle='#F5E6C8'; ctx.fillRect(0,H*0.55-2,W,4);
    // Wallpaper stripes
    ctx.fillStyle='rgba(200,160,100,0.12)';
    for(var i=0;i<W;i+=40){ ctx.fillRect(i,0,2,H*0.55); }
    // ---- WINDOW ----
    var wx=50, wy=H*0.55+30, ww=100, wh=90;
    ctx.fillStyle = windowOpen ? (raining?'#90B0D0':'#ADE8FF') : (lightOn?'#FFEEAA':'#B0CCE8');
    ctx.fillRect(wx,wy,ww,wh);
    ctx.strokeStyle='#8B6C3A'; ctx.lineWidth=5; ctx.strokeRect(wx,wy,ww,wh);
    ctx.strokeStyle='#8B6C3A'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(wx+ww/2,wy); ctx.lineTo(wx+ww/2,wy+wh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx,wy+wh/2); ctx.lineTo(wx+ww,wy+wh/2); ctx.stroke();
    if(windowOpen){ctx.save();ctx.strokeStyle='#8B6C3A';ctx.lineWidth=3;ctx.strokeRect(wx+ww/2+2,wy+2,ww/2-4,wh/2-4);ctx.restore();}
    if(raining&&windowOpen){ctx.save();ctx.strokeStyle='rgba(150,180,220,0.5)';ctx.lineWidth=1;for(var d=0;d<5;d++){ctx.beginPath();ctx.moveTo(wx+15+d*16,wy+5);ctx.lineTo(wx+10+d*16,wy+wh-5);ctx.stroke();}ctx.restore();}
    // Curtains
    ctx.fillStyle='#E88080'; ctx.fillRect(wx-12,wy-5,14,wh+10); ctx.fillRect(wx+ww-2,wy-5,14,wh+10);
    // ---- LAMP ----
    if(lightOn){
      ctx.save();
      var lg=ctx.createRadialGradient(360,H*0.55+20,5,360,H*0.55+60,90);
      lg.addColorStop(0,'rgba(255,240,150,0.55)'); lg.addColorStop(1,'rgba(255,200,0,0)');
      ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(360,H*0.55+20,90,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle='#D4A030'; ctx.beginPath(); ctx.arc(360,H*0.55+18,12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#8B6C3A'; ctx.fillRect(357,H*0.55+30,6,20);
  }

  function drawBed() {
    var bx=170, by=H*0.55+30;
    // Bed frame
    ctx.fillStyle='#8B6C3A';
    ctx.fillRect(bx,by+60,170,10);
    ctx.fillRect(bx,by+55,20,70); ctx.fillRect(bx+150,by+55,20,70);
    // Mattress
    ctx.fillStyle='#E8D5B0'; ctx.fillRect(bx+10,by+35,160,60);
    // Pillow
    ctx.fillStyle='#FFFFFF'; ctx.beginPath(); ctx.ellipse(bx+45,by+48,28,14,0,0,Math.PI*2); ctx.fill();
    // Blanket
    ctx.fillStyle='#7BC8E8'; ctx.fillRect(bx+10,by+48,160,45);
    // Blanket stripes
    ctx.fillStyle='rgba(100,180,220,0.3)';
    for(var s=0;s<4;s++){ctx.fillRect(bx+10,by+55+s*8,160,4);}
  }

  function drawKitchen() {
    var sx=295, sy=H*0.55+80;
    ctx.fillStyle='#999'; ctx.fillRect(sx,sy,110,55);
    ctx.fillStyle='#666'; ctx.fillRect(sx+5,sy+5,100,45);
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(sx+28,sy+18,11,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+75,sy+18,11,0,Math.PI*2);ctx.fill();
    if(hasMeal||cooking||hasDinner||cookingDinner){
      ctx.fillStyle='#555'; ctx.fillRect(sx+15,sy+7,50,7); ctx.fillRect(sx+10,sy+14,58,11);
      if(cooking||hasMeal){ctx.fillStyle='#FFB347';ctx.beginPath();ctx.arc(sx+38,sy+20,9,0,Math.PI*2);ctx.fill();}
      if(cookingDinner||hasDinner){ctx.fillStyle='#FF6B6B';ctx.beginPath();ctx.arc(sx+38,sy+20,9,0,Math.PI*2);ctx.fill();}
      if((cooking||cookingDinner)&&steamFrames%20<10){
        ctx.save();ctx.strokeStyle='rgba(200,200,200,0.6)';ctx.lineWidth=3;
        for(var s2=0;s2<3;s2++){ctx.beginPath();ctx.moveTo(sx+22+s2*10,sy+7);ctx.bezierCurveTo(sx+16+s2*10,sy-5,sx+28+s2*10,sy-15,sx+22+s2*10,sy-25);ctx.stroke();}
        ctx.restore();
      }
    }
    // Table
    ctx.fillStyle='#C8A060'; ctx.fillRect(180,H*0.55+100,90,8); ctx.fillRect(195,H*0.55+108,60,48);
    if(hasMeal){
      ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.ellipse(225,H*0.55+103,20,9,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#FFB347'; ctx.beginPath(); ctx.arc(225,H*0.55+103,7,0,Math.PI*2); ctx.fill();
    }
    if(hasDinner){
      ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.ellipse(225,H*0.55+103,20,9,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#FF6B6B'; ctx.beginPath(); ctx.arc(225,H*0.55+103,7,0,Math.PI*2); ctx.fill();
    }
  }

  // Draw a sleeping person lying in bed (visible character, not just z's)
  function drawSleepingPerson() {
    var bx = 170, by = H*0.55+30;
    ctx.save();
    // Body lying under blanket — show torso shape as a lump
    ctx.fillStyle = '#5B9BD5';
    ctx.beginPath();
    ctx.ellipse(245, by+68, 52, 13, 0, 0, Math.PI*2);
    ctx.fill();
    // Redraw blanket on top of body (covers torso)
    ctx.fillStyle='#7BC8E8';
    ctx.fillRect(bx+10, by+55, 160, 38);
    ctx.fillStyle='rgba(100,180,220,0.3)';
    for(var s=0;s<4;s++){ctx.fillRect(bx+10,by+55+s*8,160,4);}
    // Head peeking out from pillow end
    ctx.fillStyle='#FDBCB4';
    ctx.beginPath(); ctx.arc(207, by+48, 13, 0, Math.PI*2); ctx.fill();
    // Hair
    ctx.fillStyle='#5C3A1E';
    ctx.beginPath(); ctx.arc(207, by+44, 13, Math.PI, 0); ctx.fill();
    // Closed eyes (sleeping)
    ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(202, by+47, 3, Math.PI, 0); ctx.stroke(); // left eye closed
    ctx.beginPath(); ctx.arc(212, by+47, 3, Math.PI, 0); ctx.stroke(); // right eye closed
    // Little smile
    ctx.beginPath(); ctx.arc(207, by+51, 3.5, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();
    // ZZZ bubbles floating up
    ctx.fillStyle='rgba(150,180,255,0.9)';
    ctx.font='bold 13px Arial';
    var zo = Math.sin(tick*0.05)*3;
    ctx.fillText('z', 222, by+30+zo);
    ctx.fillText('z', 230, by+18+zo);
    ctx.font='bold 17px Arial';
    ctx.fillText('Z', 238, by+4+zo);
    ctx.restore();
  }

  function drawPerson() {
    // If sleeping, draw the special lying-down person
    if(sleeping){
      drawSleepingPerson();
      return;
    }
    ctx.save();
    var px2=personX, py2=H*0.55+30;
    var bob = (personWalking ? Math.sin(tick*0.22)*4 : Math.sin(tick*0.08)*1.5);
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.beginPath(); ctx.ellipse(px2,py2+75,16,5,0,0,Math.PI*2); ctx.fill();
    // Legs
    ctx.fillStyle='#555';
    if(personWalking){
      var la=Math.sin(tick*0.22)*14;
      ctx.fillRect(px2-10+la,py2+54,10,20); ctx.fillRect(px2-la,py2+54,10,20);
    } else {
      ctx.fillRect(px2-12,py2+54,10,20); ctx.fillRect(px2+2,py2+54,10,20);
    }
    // Body
    ctx.fillStyle='#5B9BD5'; ctx.beginPath(); ctx.moveTo(px2-13,py2+14+bob); ctx.lineTo(px2+13,py2+14+bob); ctx.lineTo(px2+15,py2+55+bob); ctx.lineTo(px2-15,py2+55+bob); ctx.closePath(); ctx.fill();
    // Arms
    ctx.fillStyle='#3A6EA5';
    if(personAction==='cook'){
      ctx.fillRect(px2+12*personFacing,py2+16+bob,8*personFacing,22);
      ctx.fillRect(px2-12,py2+16+bob,-8,30);
    } else if(personAction==='eat'){
      ctx.fillRect(px2-20,py2+16+bob,8,24);
      ctx.fillRect(px2+12,py2+16+bob,8,24);
    } else {
      ctx.fillRect(px2-20,py2+14+bob,8,26); ctx.fillRect(px2+12,py2+14+bob,8,26);
    }
    // Hands
    ctx.fillStyle='#FDBCB4';
    ctx.beginPath(); ctx.arc(px2-16,py2+40+bob,6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(px2+18,py2+40+bob,6,0,Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle='#FDBCB4'; ctx.beginPath(); ctx.arc(px2,py2+bob,14,0,Math.PI*2); ctx.fill();
    // Hair
    ctx.fillStyle='#5C3A1E'; ctx.beginPath(); ctx.arc(px2,py2-4+bob,14,Math.PI,0); ctx.fill();
    // Eyes
    ctx.fillStyle='#333';
    ctx.beginPath(); ctx.arc(px2-5*personFacing+3,py2+2+bob,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(px2+5*personFacing+3,py2+2+bob,2.5,0,Math.PI*2); ctx.fill();
    // Smile
    ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(px2,py2+6+bob,5,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
    if(eating){ctx.font='16px Arial';ctx.fillText('😋',px2-8,py2-18+bob);}
    ctx.restore();
  }

  function drawRain() {
    if(!raining) return;
    ctx.save(); ctx.strokeStyle='rgba(150,200,255,0.5)'; ctx.lineWidth=1.5;
    raindrops.forEach(function(d){
      ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-3,d.y+d.len); ctx.stroke();
      d.y+=d.spd; if(d.y>H){d.y=-10;d.x=Math.random()*W;}
    });
    ctx.restore();
  }

  function drawClickHalo() {
    if(!clickable) return;
    // Halo follows person correctly whether sleeping or standing
    var px = sleeping ? 207 : personX;
    var py = sleeping ? H*0.55+48 : H*0.55+30;
    ctx.save();
    var pulse = 0.4+0.3*Math.sin(tick*0.12);
    ctx.globalAlpha=pulse;
    ctx.strokeStyle='#FFE033'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(px,py,28,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // ---- MAIN LOOP ----
  function drawAll() {
    ctx.clearRect(0,0,W,H);
    // Lerp sky color gradually
    skyColor[0]=lerp(skyColor[0],targetSky[0],0.018);
    skyColor[1]=lerp(skyColor[1],targetSky[1],0.018);
    skyColor[2]=lerp(skyColor[2],targetSky[2],0.018);
    // Move sun across the sky
    var moveSun = (phase==='rising'||phase==='morning'||phase==='goWindow'||phase==='windowOpen'||phase==='goCook'||phase==='cooking'||phase==='goEat'||phase==='eating'||phase==='afternoon'||phase==='raining'||phase==='goCloseWin'||phase==='winClosed'||phase==='rainOver'||phase==='goOpenWin');
    if(moveSun){ if(sunX<400){sunX+=0.25;} if(sunX<180&&sunY>55){sunY-=0.08;} else if(sunX>=180){sunY+=0.05;} }
    if(phase==='dusk'||phase==='cookingDinner'){ sunX+=0.4; sunY+=0.3; }
    // Walk person toward target
    if(personWalking){
      var dx=personTargetX-personX;
      if(Math.abs(dx)<3){ personX=personTargetX; personWalking=false; personAction='stand'; if(actionCallback){var cb=actionCallback;actionCallback=null;cb();} }
      else { personX+=dx*0.06; }
    }
    drawSky(); drawSun(); drawMoon(); drawClouds();
    drawRoom(); drawBed(); drawKitchen();
    drawPerson(); drawRain(); drawClickHalo();
    tick++; steamFrames++;
    requestAnimationFrame(drawAll);
  }

  // ---- START ----
  setMsg('🌙 夜晚... 好好睡一觉吧');
  setHint('');
  setTimeout(function(){ startDay(); }, 3000);
  drawAll();

  // BUTTON CHECKLIST: canvas(click) ✓
});
</script>
